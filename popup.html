<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Shorts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    .header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
    }

    .eyebrow {
      font-size: 9px;
      letter-spacing: 5px;
      color: #ff3232;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
      line-height: 1;
      color: #f0f0f0;
    }

    .title span {
      color: #ff3232;
    }

    .status-section {
      padding: 20px;
      border-bottom: 1px solid #1a1a1a;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      transition: all 0.2s ease;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #444;
      border-radius: 1px;
      transition: all 0.2s ease;
    }

    input:checked + .toggle-track {
      background: #1a0000;
      border-color: #ff3232;
      box-shadow: 0 0 12px rgba(255,50,50,0.2);
    }

    input:checked + .toggle-track + .toggle-thumb,
    input:checked ~ .toggle-thumb {
      left: 23px;
      background: #ff3232;
      box-shadow: 0 0 8px rgba(255,50,50,0.5);
    }

    .toggle input:checked ~ .toggle-thumb {
      left: 23px;
      background: #ff3232;
    }

    .status-text {
      margin-top: 10px;
      font-size: 10px;
      letter-spacing: 1px;
    }

    .status-text.on { color: #ff3232; }
    .status-text.off { color: #333; }

    .stats-section {
      padding: 20px;
      display: flex;
      gap: 12px;
    }

    .stat-box {
      flex: 1;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 2px;
      padding: 12px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: #ff3232;
      line-height: 1;
      text-shadow: 0 0 20px rgba(255,50,50,0.3);
    }

    .stat-label {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #333;
      margin-top: 4px;
      line-height: 1.3;
    }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #111;
      font-size: 9px;
      color: #222;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="eyebrow">Extensión activa</div>
    <div class="title">No <span>Shorts.</span></div>
  </div>

  <div class="status-section">
    <div class="status-row">
      <span class="status-label">Bloqueo</span>
      <label class="toggle">
        <input type="checkbox" id="toggle" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="status-text on" id="status-text">⛔ ACTIVO — shorts bloqueados</div>
  </div>

  <div class="stats-section">
    <div class="stat-box">
      <div class="stat-num" id="count-today">0</div>
      <div class="stat-label">hoy</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="count-total">0</div>
      <div class="stat-label">total</div>
    </div>
  </div>

  <div class="footer">No te permites ver esto.</div>

  <script src="popup.js"></script>
</body>
</html>
